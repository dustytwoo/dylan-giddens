<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dylan Giddens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --bg:#07060a;
      --bg2:#0d0b12;
      --fg:#f0e8ff;
      --cream:#e8dff5;
      --muted:#6b5f80;
      --accent:#c084fc;
      --accent2:#e879f9;
      --hot:#f0abfc;
      --rule:rgba(192,132,252,0.15);
      --rule2:rgba(192,132,252,0.08);
      --display:'Bebas Neue',sans-serif;
      --serif:'Cormorant Garamond',serif;
      --mono:'Courier Prime',monospace;
    }

    html{scroll-behavior:smooth}
    body{
      background:var(--bg);
      color:var(--fg);
      font-family:var(--serif);
      font-weight:300;
      line-height:1.6;
      overflow-x:hidden;
      cursor:none;
    }

    /* ── GRAIN ── */
    body::before{
      content:'';position:fixed;inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.04;pointer-events:none;z-index:9000;
    }

    /* ── AMBIENT GRADIENT ── */
    .ambient{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(192,132,252,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(232,121,249,0.05) 0%, transparent 60%);
    }

    /* ── CURSOR ── */
    #cur{
      position:fixed;width:10px;height:10px;
      background:var(--accent);border-radius:50%;
      pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);
      transition:width .15s,height .15s,background .2s;
    }
    #cur-ring{
      position:fixed;width:36px;height:36px;
      border:1px solid rgba(192,132,252,0.5);border-radius:50%;
      pointer-events:none;z-index:9998;
      transform:translate(-50%,-50%);
      transition:width .2s,height .2s,border-color .2s;
    }
    body:has(a:hover) #cur{width:6px;height:6px}
    body:has(a:hover) #cur-ring{width:50px;height:50px;border-color:rgba(192,132,252,0.8)}

    /* ── NAV ── */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:500;
      display:flex;justify-content:space-between;align-items:center;
      padding:1.5rem 5rem;
      background:linear-gradient(to bottom,rgba(7,6,10,.97) 0%,transparent 100%);
      backdrop-filter:blur(4px);
    }
    .nav-logo{
      font-family:var(--display);
      font-size:1.4rem;letter-spacing:0.1em;
      color:var(--accent);text-decoration:none;
    }
    .nav-links{display:flex;gap:2.5rem;list-style:none}
    .nav-links a{
      font-family:var(--mono);font-size:0.68rem;
      letter-spacing:0.2em;text-transform:uppercase;
      color:var(--muted);text-decoration:none;
      transition:color .2s;position:relative;
    }
    .nav-links a::after{
      content:'';position:absolute;bottom:-3px;left:0;right:0;
      height:1px;background:var(--accent);
      transform:scaleX(0);transform-origin:left;transition:transform .25s;
    }
    .nav-links a:hover{color:var(--fg)}
    .nav-links a:hover::after{transform:scaleX(1)}

    /* ── HERO ── */
    #hero{
      min-height:100vh;
      display:grid;grid-template-columns:1fr 1fr;
      align-items:center;
      padding:0 5rem;
      position:relative;overflow:hidden;
    }

    /* Vinyl record */
    .vinyl-wrap{
      position:relative;display:flex;align-items:center;justify-content:center;
    }
    .vinyl{
      width:min(500px,45vw);height:min(500px,45vw);
      animation:spin 18s linear infinite;
      position:relative;
    }
    .vinyl.paused{animation-play-state:paused}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    .vinyl-svg{width:100%;height:100%}

    /* Hero text */
    .hero-text{position:relative;z-index:2}
    .hero-eyebrow{
      font-family:var(--mono);font-size:0.7rem;letter-spacing:0.25em;
      text-transform:uppercase;color:var(--accent);
      margin-bottom:1.2rem;display:flex;align-items:center;gap:0.75rem;
      opacity:0;animation:fadeUp .7s .2s forwards;
    }
    .eq-bars{display:flex;gap:3px;align-items:flex-end;height:14px}
    .eq-bar{
      width:3px;background:var(--accent);border-radius:1px;
      animation:eq var(--d,.6s) ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1){--d:.5s;height:6px}
    .eq-bar:nth-child(2){--d:.8s;height:12px}
    .eq-bar:nth-child(3){--d:.6s;height:8px}
    .eq-bar:nth-child(4){--d:.9s;height:14px}
    .eq-bar:nth-child(5){--d:.4s;height:5px}
    @keyframes eq{from{transform:scaleY(0.3)}to{transform:scaleY(1)}}

    h1.hero-name{
      font-family:var(--display);
      font-size:clamp(4rem,10vw,10rem);
      line-height:0.9;letter-spacing:0.02em;
      margin-bottom:1.5rem;
      opacity:0;animation:fadeUp .9s .35s forwards;
    }
    h1.hero-name .line2{
      color:transparent;
      -webkit-text-stroke:1.5px var(--accent);
    }

    .hero-desc{
      font-size:1.15rem;font-style:italic;
      color:rgba(240,232,255,0.6);
      line-height:1.7;max-width:480px;margin-bottom:2.5rem;
      opacity:0;animation:fadeUp .9s .5s forwards;
    }

    .hero-cta{
      display:flex;gap:1.5rem;align-items:center;
      opacity:0;animation:fadeUp .9s .65s forwards;
    }
    .btn-fill{
      font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;
      text-transform:uppercase;
      background:var(--accent);color:var(--bg);
      padding:.9rem 2.4rem;text-decoration:none;
      transition:background .2s,transform .2s,box-shadow .2s;
      clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
    }
    .btn-fill:hover{
      background:var(--accent2);transform:translateY(-2px);
      box-shadow:0 10px 40px rgba(192,132,252,0.35);
    }
    .btn-outline{
      font-family:var(--mono);font-size:0.7rem;letter-spacing:0.2em;
      text-transform:uppercase;color:var(--muted);
      text-decoration:none;border-bottom:1px solid var(--rule);
      padding-bottom:2px;transition:color .2s,border-color .2s;
    }
    .btn-outline:hover{color:var(--fg);border-color:var(--accent)}

    .hero-scroll-hint{
      position:absolute;bottom:3rem;left:5rem;
      display:flex;align-items:center;gap:0.75rem;
      opacity:0;animation:fadeIn 1s 1.4s forwards;
    }
    .scroll-line-v{
      width:1px;height:50px;
      background:linear-gradient(to bottom,var(--accent),transparent);
      animation:scrollBlink 2s infinite;
    }
    @keyframes scrollBlink{0%,100%{opacity:.3}50%{opacity:1}}
    .hero-scroll-hint span{
      font-family:var(--mono);font-size:0.6rem;letter-spacing:.25em;
      text-transform:uppercase;color:var(--muted);writing-mode:vertical-rl;
    }

    /* ── WAVEFORM DIVIDER ── */
    .wave-divider{
      width:100%;overflow:hidden;line-height:0;
      position:relative;z-index:1;opacity:.25;
      padding:0 5rem;
    }
    .wave-divider svg{width:100%;height:40px}

    /* ── MARQUEE ── */
    .marquee-wrap{
      overflow:hidden;padding:1.2rem 0;
      border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
      background:var(--bg2);position:relative;z-index:1;
    }
    .marquee-track{
      display:flex;gap:0;white-space:nowrap;
      animation:marquee 35s linear infinite;
    }
    .marquee-item{
      font-family:var(--display);font-size:1.1rem;letter-spacing:.1em;
      color:var(--muted);flex-shrink:0;padding:0 2rem;
      display:flex;align-items:center;gap:2rem;
    }
    .marquee-dot{color:var(--accent);font-size:.6rem}
    @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ── SECTIONS ── */
    .section{
      padding:7rem 5rem;max-width:1400px;margin:0 auto;
      position:relative;z-index:1;
    }
    .section-full{
      padding:7rem 5rem;position:relative;z-index:1;
    }

    .section-eyebrow{
      font-family:var(--mono);font-size:0.65rem;letter-spacing:.3em;
      text-transform:uppercase;color:var(--accent);
      margin-bottom:1rem;display:flex;align-items:center;gap:1rem;
    }
    .section-eyebrow::before{
      content:'';width:30px;height:1px;background:var(--accent);
    }
    h2.section-title{
      font-family:var(--display);
      font-size:clamp(3rem,7vw,7rem);
      line-height:.95;letter-spacing:.03em;
      margin-bottom:4rem;
    }
    h2.section-title .outline{
      color:transparent;-webkit-text-stroke:1px var(--accent);
    }

    /* ── ABOUT ── */
    .about-body{max-width:720px}
    .about-img-wrap{position:relative;display:block;overflow:hidden}
    .about-img{
      width:100%;aspect-ratio:3/4;object-fit:cover;
      object-position:center top;display:block;
      filter:contrast(1.05) saturate(0.9);
    }
    .about-img-frame{
      position:absolute;inset:0;
      border:1px solid var(--rule);
      pointer-events:none;
    }
    .about-img-frame::before{
      content:'';position:absolute;top:12px;left:12px;right:-12px;bottom:-12px;
      border:1px solid rgba(192,132,252,0.12);
    }
    .about-tag{
      position:absolute;bottom:-1px;left:0;right:0;
      padding:.5rem 0.8rem;
      background:rgba(7,6,10,.9);backdrop-filter:blur(6px);
      border-top:1px solid var(--rule);
      font-family:var(--mono);font-size:.6rem;
      letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .about-body p{
      font-size:1.1rem;color:rgba(240,232,255,.65);
      line-height:1.85;margin-bottom:1.5rem;
    }
    .about-body strong{color:var(--fg);font-weight:600}

    .about-stats{
      display:grid;grid-template-columns:repeat(4,1fr);
      gap:1px;margin-top:3rem;
    }
    .stat{
      background:var(--bg2);padding:1.5rem;
      border:1px solid var(--rule);
      transition:border-color .3s;
    }
    .stat:hover{border-color:rgba(192,132,252,.4)}
    .stat-n{
      font-family:var(--display);font-size:2.5rem;
      color:var(--accent);line-height:1;margin-bottom:.3rem;
    }
    .stat-l{
      font-family:var(--mono);font-size:.6rem;
      letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    }

    /* ── WORK / TRACKLIST ── */
    .track-list{display:flex;flex-direction:column}
    .track{
      display:grid;grid-template-columns:60px 1fr auto;
      gap:2rem;align-items:start;
      padding:2rem 0;
      border-bottom:1px solid var(--rule2);
      position:relative;cursor:pointer;
      transition:background .2s;
    }
    .track::before{
      content:'';position:absolute;left:-5rem;right:-5rem;top:0;bottom:0;
      background:rgba(192,132,252,.03);opacity:0;transition:opacity .2s;
    }
    .track:hover::before{opacity:1}

    .track-num{
      font-family:var(--display);font-size:1.8rem;
      color:rgba(192,132,252,.25);line-height:1;
      padding-top:.3rem;transition:color .2s;
    }
    .track:hover .track-num{color:var(--accent)}

    .track-info h3{
      font-family:var(--display);font-size:2rem;
      letter-spacing:.03em;line-height:1.1;
      margin-bottom:.4rem;transition:color .2s;
    }
    .track:hover .track-info h3{color:var(--accent)}
    .track-info p{
      font-family:var(--serif);font-style:italic;
      font-size:.95rem;color:var(--muted);line-height:1.6;
      max-width:580px;margin-bottom:.8rem;
    }
    .track-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
    .track-tag{
      font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;
      text-transform:uppercase;color:var(--accent);
      border:1px solid rgba(192,132,252,.2);
      padding:.2rem .6rem;border-radius:0;
    }
    .track-link{
      display:inline-block;margin-top:.8rem;
      font-family:var(--mono);font-size:.62rem;letter-spacing:.15em;
      text-transform:uppercase;color:var(--accent);text-decoration:none;
      border-bottom:1px solid var(--rule);padding-bottom:2px;
      transition:color .2s,border-color .2s;
    }
    .track-link:hover{color:var(--hot);border-color:var(--hot)}

    .now-playing{
      display:flex;align-items:center;gap:.5rem;
      opacity:0;transition:opacity .2s;padding-top:.5rem;
    }
    .track:hover .now-playing{opacity:1}
    .np-dot{
      width:8px;height:8px;background:var(--accent);
      border-radius:50%;animation:pulse 1s infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.6}}
    .np-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}

    /* ── REELS ── */
    .reels-bg{background:var(--bg2);border-top:1px solid var(--rule2);border-bottom:1px solid var(--rule2)}
    .reels-header{
      display:flex;justify-content:space-between;align-items:flex-end;
      margin-bottom:3rem;
    }
    .reels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
    .reel-card{
      background:var(--bg);border:1px solid var(--rule2);overflow:hidden;
      transition:border-color .3s,transform .3s;
    }
    .reel-card:hover{border-color:rgba(192,132,252,.4);transform:translateY(-4px)}
    .reel-embed{width:100%;aspect-ratio:9/16;max-height:460px;position:relative;overflow:hidden}
    .reel-embed iframe{width:100%;height:100%;border:none;display:block}
    .reel-meta{padding:1rem 1.2rem;border-top:1px solid var(--rule2)}
    .reel-meta h4{font-family:var(--display);font-size:1rem;letter-spacing:.05em;margin-bottom:.2rem}
    .reel-meta p{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    .all-link{
      font-family:var(--mono);font-size:.66rem;letter-spacing:.18em;
      text-transform:uppercase;color:var(--accent);text-decoration:none;
      border-bottom:1px solid var(--rule);padding-bottom:2px;
      transition:color .2s,border-color .2s;white-space:nowrap;
    }
    .all-link:hover{color:var(--hot);border-color:var(--hot)}

    /* ── SKILLS ── */
    .skills-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
    .skill-card{
      background:var(--bg2);padding:2.2rem;
      border:1px solid transparent;
      transition:border-color .3s,transform .3s;
      position:relative;overflow:hidden;
    }
    .skill-card::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      transform:scaleX(0);transform-origin:left;transition:transform .3s;
    }
    .skill-card:hover{border-color:rgba(192,132,252,.2);transform:translateY(-3px)}
    .skill-card:hover::after{transform:scaleX(1)}
    .skill-icon{
      font-size:1.2rem;margin-bottom:1rem;color:var(--accent);
      font-family:var(--mono);letter-spacing:.1em;
    }
    .skill-card h4{
      font-family:var(--display);font-size:1.3rem;
      letter-spacing:.05em;margin-bottom:.6rem;
    }
    .skill-card p{font-family:var(--serif);font-size:.9rem;color:var(--muted);line-height:1.7}

    /* ── MEDIA / PHOTO ── */
    .media-tabs{
      display:flex;gap:0;margin-bottom:2.5rem;
      border-bottom:1px solid var(--rule2);
    }
    .media-tab{
      font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--muted);
      padding:.7rem 1.8rem;cursor:pointer;background:none;border:none;
      border-bottom:2px solid transparent;margin-bottom:-1px;
      transition:color .2s,border-color .2s;
    }
    .media-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .media-tab:hover{color:var(--fg)}
    .media-panel{display:none}
    .media-panel.active{display:block}

    .photo-grid{columns:3;column-gap:3px}
    .photo-item{
      break-inside:avoid;margin-bottom:3px;overflow:hidden;
      border:1px solid var(--rule2);cursor:pointer;position:relative;
      transition:border-color .3s;
    }
    .photo-item:hover{border-color:rgba(192,132,252,.4)}
    .photo-item img{
      width:100%;display:block;
      filter:saturate(.85) contrast(1.05);
      transition:transform .5s ease,filter .3s;
    }
    .photo-item:hover img{transform:scale(1.04);filter:saturate(1) contrast(1.1)}
    .photo-overlay{
      position:absolute;inset:0;
      background:rgba(7,6,10,0);
      display:flex;align-items:flex-end;padding:.8rem;
      transition:background .3s;
    }
    .photo-item:hover .photo-overlay{background:rgba(7,6,10,.55)}
    .photo-overlay span{
      font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--fg);
      opacity:0;transform:translateY(5px);transition:opacity .3s,transform .3s;
    }
    .photo-item:hover .photo-overlay span{opacity:1;transform:translateY(0)}

    .video-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px}
    @media(max-width:700px){.video-grid{grid-template-columns:1fr}}
    .video-item{
      border:1px solid var(--rule2);overflow:hidden;background:var(--bg2);
      transition:border-color .3s,transform .3s;
    }
    .video-item:hover{border-color:rgba(192,132,252,.4);transform:translateY(-3px)}
    .video-embed{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--bg)}
    .video-embed iframe{width:100%;height:100%;border:none;display:block}
    .video-placeholder{
      width:100%;height:100%;position:absolute;inset:0;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.8rem;
      background:linear-gradient(160deg,#0e0c15,#07060a);
    }
    .vph-icon{
      width:44px;height:44px;border:1px solid var(--rule);border-radius:50%;
      display:flex;align-items:center;justify-content:center;color:var(--accent);
    }
    .vph-text{
      font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;
      text-transform:uppercase;color:var(--muted);text-align:center;line-height:1.8;
    }
    .video-meta{padding:1rem 1.2rem;border-top:1px solid var(--rule2)}
    .video-meta h4{font-family:var(--display);font-size:1rem;letter-spacing:.05em;margin-bottom:.2rem}
    .video-meta p{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

    /* ── LIGHTBOX ── */
    #lightbox{
      position:fixed;inset:0;z-index:8000;
      background:rgba(7,6,10,.97);
      display:none;align-items:center;justify-content:center;cursor:pointer;
    }
    #lightbox.open{display:flex}
    #lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border:1px solid var(--rule)}
    #lb-close{
      position:absolute;top:2rem;right:2rem;
      font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .2s;
    }
    #lb-close:hover{color:var(--fg)}

    /* ── CONTACT ── */

    .contact-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .contact-btn {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      padding: 0.9rem 2rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      clip-path: polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }
    .contact-btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(192,132,252,0.3);
    }
    .contact-btn-outline {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      clip-path: none;
    }
    .contact-btn-outline:hover {
      background: rgba(192,132,252,0.1);
      box-shadow: 0 10px 30px rgba(192,132,252,0.15);
    }
    .contact-btn-icon {
      font-size: 0.9rem;
    }

    .contact-bg-text{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;overflow:hidden;
    }
    .contact-bg-text span{
      font-family:var(--display);font-size:clamp(10rem,22vw,22rem);
      color:rgba(192,132,252,.03);line-height:1;white-space:nowrap;
    }
    .contact-inner{position:relative;z-index:1;text-align:center}
    .contact-email{
      display:inline-block;font-family:var(--display);
      font-size:clamp(2rem,5vw,5rem);letter-spacing:.05em;
      color:var(--fg);text-decoration:none;
      transition:color .2s;margin:1.5rem 0 3rem;
    }
    .contact-email:hover{color:var(--accent)}
    .contact-email span{color:var(--accent)}
    .social-row{display:flex;justify-content:center;gap:2.5rem}
    .social-row a{
      font-family:var(--mono);font-size:.65rem;letter-spacing:.2em;
      text-transform:uppercase;color:var(--muted);text-decoration:none;
      transition:color .2s;
    }
    .social-row a:hover{color:var(--fg)}

    /* ── FOOTER ── */
    footer{
      padding:1.8rem 5rem;border-top:1px solid var(--rule2);
      display:flex;justify-content:space-between;align-items:center;
      position:relative;z-index:1;
    }
    footer p{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;color:var(--muted)}

    /* ── ANIMATIONS ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .reveal{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s ease}
    .reveal.visible{opacity:1;transform:translateY(0)}

    /* ── RESPONSIVE ── */
    @media(max-width:1000px){
      /* NAV */
      nav{padding:1.2rem 1.5rem}
      .nav-links{display:none}

      /* HERO */
      #hero{grid-template-columns:1fr;padding:7rem 1.5rem 4rem;gap:2rem;min-height:auto}
      .vinyl-wrap{order:-1;margin-top:1rem}
      .vinyl{width:180px;height:180px}
      h1.hero-name{font-size:clamp(3rem,15vw,6rem);line-height:0.95}
      .hero-desc{font-size:0.95rem;max-width:100%}
      .hero-bg-text{display:none}
      .hero-scroll-hint{display:none}

      /* SECTIONS */
      .section,.section-full{padding:4rem 1.5rem}
      h2.section-title{font-size:clamp(2.5rem,12vw,5rem)}

      /* ABOUT */
      .about-grid{grid-template-columns:1fr !important;gap:2rem}
      .about-img-wrap{max-width:200px;margin:0 auto;display:block;position:relative;overflow:hidden}
      .about-img{width:100%;height:auto;display:block;object-fit:cover}
      .about-img-frame{position:absolute;inset:0;pointer-events:none}
      .about-img-frame::before{display:none}
      .about-tag{font-size:0.55rem;letter-spacing:0.08em;padding:0.4rem 0.6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .about-stats{grid-template-columns:repeat(2,1fr)}
      .about-body p{font-size:1rem}

      /* WORK */
      .track{grid-template-columns:36px 1fr;gap:1rem;padding:1.5rem 0}
      .track-info h3{font-size:1.3rem}
      .track-info p{font-size:0.85rem}

      /* REELS */
      .reels-grid{grid-template-columns:1fr}
      .reels-header{flex-direction:column;gap:1rem;align-items:flex-start}

      /* SKILLS */
      .skills-grid{grid-template-columns:1fr}
      .skill-card{padding:1.8rem}

      /* MEDIA */
      .photo-grid{columns:2;column-gap:3px}
      .video-grid{grid-template-columns:1fr}

      /* CONTACT */
      .contact-buttons{flex-direction:column;align-items:center;gap:0.75rem}
      .contact-btn{width:220px;justify-content:center}
      h2.section-title{word-break:break-word}

      /* FOOTER */
      footer{flex-direction:column;gap:0.5rem;text-align:center;padding:1.5rem}
    }

    @media(max-width:480px){
      .section,.section-full{padding:3rem 1.2rem}
      .photo-grid{columns:1}
      .about-stats{grid-template-columns:repeat(2,1fr)}
      .track-tags{display:none}
      h1.hero-name{font-size:clamp(2.8rem,18vw,5rem)}
      .marquee-item{font-size:0.9rem}
    }
  </style>
</head>
